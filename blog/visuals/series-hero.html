<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Agentic Development — Series Hero</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0f172a;
  }

  .hero {
    width: 1200px;
    height: 627px;
    position: relative;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Decorative grid overlay */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Top-left accent blob */
  .blob-tl {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Bottom-right accent blob */
  .blob-br {
    position: absolute;
    bottom: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Top label bar */
  .top-label {
    position: absolute;
    top: 32px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .top-label-pill {
    background: rgba(34,211,238,0.1);
    border: 1px solid rgba(34,211,238,0.25);
    color: #22d3ee;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 999px;
  }

  .top-label-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #334155;
  }

  .top-label-text {
    color: #475569;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 80px;
  }

  .series-tag {
    display: inline-block;
    color: #475569;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .main-title {
    font-size: 96px;
    font-weight: 800;
    color: #f1f5f9;
    line-height: 1;
    letter-spacing: -3px;
    margin-bottom: 28px;
  }

  .main-title span {
    color: transparent;
    -webkit-text-stroke: 1px rgba(241,245,249,0.3);
  }

  .subtitle {
    font-size: 28px;
    font-weight: 500;
    color: #22d3ee;
    letter-spacing: -0.5px;
    margin-bottom: 40px;
    line-height: 1.3;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 48px;
  }

  .stat-item {
    padding: 0 32px;
    text-align: center;
  }

  .stat-item + .stat-item {
    border-left: 1px solid #1e293b;
  }

  .stat-number {
    font-size: 26px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: #64748b;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Author */
  .author {
    color: #64748b;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .author strong {
    color: #94a3b8;
    font-weight: 600;
  }

  /* Bottom accent line */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #22d3ee 0%, #6366f1 50%, #22d3ee 100%);
  }

  /* Corner decorations */
  .corner-tl {
    position: absolute;
    top: 24px;
    left: 32px;
    width: 40px;
    height: 40px;
    border-top: 2px solid rgba(34,211,238,0.3);
    border-left: 2px solid rgba(34,211,238,0.3);
    border-radius: 2px 0 0 0;
  }

  .corner-tr {
    position: absolute;
    top: 24px;
    right: 32px;
    width: 40px;
    height: 40px;
    border-top: 2px solid rgba(34,211,238,0.3);
    border-right: 2px solid rgba(34,211,238,0.3);
    border-radius: 0 2px 0 0;
  }

  .corner-bl {
    position: absolute;
    bottom: 24px;
    left: 32px;
    width: 40px;
    height: 40px;
    border-bottom: 2px solid rgba(99,102,241,0.3);
    border-left: 2px solid rgba(99,102,241,0.3);
    border-radius: 0 0 0 2px;
  }

  .corner-br {
    position: absolute;
    bottom: 24px;
    right: 32px;
    width: 40px;
    height: 40px;
    border-bottom: 2px solid rgba(99,102,241,0.3);
    border-right: 2px solid rgba(99,102,241,0.3);
    border-radius: 0 0 2px 0;
  }
</style>
</head>
<body>
<div class="hero">
  <div class="grid-overlay"></div>
  <div class="blob-tl"></div>
  <div class="blob-br"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="top-label">
    <div class="top-label-pill">LinkedIn Series</div>
    <div class="top-label-dot"></div>
    <div class="top-label-text">10-Part Technical Deep Dive</div>
  </div>

  <div class="content">
    <div class="series-tag">Nick Krzemienski &nbsp;·&nbsp; 2025</div>

    <div class="main-title">Agentic<br><span>Development</span></div>

    <div class="subtitle">10 Lessons from 8,481 AI Coding Sessions</div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-number" style="color:#22d3ee;">8,481</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" style="color:#f59e0b;">90</div>
        <div class="stat-label">Days</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" style="color:#6366f1;">10</div>
        <div class="stat-label">Posts</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" style="color:#a78bfa;">26,400</div>
        <div class="stat-label">Words</div>
      </div>
    </div>

    <div class="author">By <strong>Nick Krzemienski</strong></div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
