<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Post 2 — Multi-Agent Consensus Hero</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 627px;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0f172a;
  }

  .hero {
    width: 1200px;
    height: 627px;
    position: relative;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #0f172a 100%);
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .blob-tl {
    position: absolute;
    top: -120px; left: -120px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%);
  }

  .blob-br {
    position: absolute;
    bottom: -100px; right: -100px;
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 70%);
  }

  /* Left: text content */
  .left-panel {
    position: relative;
    z-index: 10;
    flex: 0 0 600px;
    padding: 0 64px 0 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .post-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  .post-tag-pill {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    color: #818cf8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 999px;
  }

  .post-tag-num {
    color: #475569;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .main-title {
    font-size: 52px;
    font-weight: 800;
    color: #f1f5f9;
    line-height: 1.08;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }

  .main-title em {
    font-style: normal;
    color: #6366f1;
  }

  .subtitle {
    font-size: 18px;
    font-weight: 500;
    color: #64748b;
    line-height: 1.5;
    margin-bottom: 36px;
    letter-spacing: 0.2px;
  }

  .subtitle span {
    color: #22d3ee;
  }

  .author {
    color: #475569;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .author strong { color: #64748b; }

  /* Right: visual diagram */
  .right-panel {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 40px;
  }

  .diagram {
    position: relative;
    width: 480px;
    height: 420px;
  }

  /* Agent circles */
  .agent-circle {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    border: 2px solid;
  }

  .agent-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .agent-sublabel {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    opacity: 0.7;
    margin-top: 2px;
  }

  .agent-check {
    font-size: 18px;
    margin-top: 4px;
  }

  /* Lead — top center */
  .agent-lead {
    top: 20px;
    left: 190px;
    background: rgba(99,102,241,0.15);
    border-color: #6366f1;
    color: #818cf8;
    box-shadow: 0 0 24px rgba(99,102,241,0.25);
  }

  /* Alpha — bottom left */
  .agent-alpha {
    top: 220px;
    left: 60px;
    background: rgba(34,211,238,0.1);
    border-color: #22d3ee;
    color: #22d3ee;
    box-shadow: 0 0 20px rgba(34,211,238,0.2);
  }

  /* Bravo — bottom right */
  .agent-bravo {
    top: 220px;
    left: 320px;
    background: rgba(167,139,250,0.1);
    border-color: #a78bfa;
    color: #a78bfa;
    box-shadow: 0 0 20px rgba(167,139,250,0.2);
  }

  /* Connecting lines (SVG inside diagram) */
  .diagram-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Gate icon */
  .gate {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 56px;
    background: rgba(5,150,105,0.15);
    border: 2px solid #059669;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 28px rgba(5,150,105,0.25);
  }

  .gate-label {
    font-size: 11px;
    font-weight: 700;
    color: #6ee7b7;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .gate-sublabel {
    font-size: 9px;
    color: #047857;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #6366f1 0%, #22d3ee 50%, #6366f1 100%);
  }

  /* Corner marks */
  .corner { position: absolute; width: 32px; height: 32px; }
  .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(99,102,241,0.35); border-left: 2px solid rgba(99,102,241,0.35); border-radius: 2px 0 0 0; }
  .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(99,102,241,0.35); border-right: 2px solid rgba(99,102,241,0.35); border-radius: 0 2px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(34,211,238,0.25); border-left: 2px solid rgba(34,211,238,0.25); border-radius: 0 0 0 2px; }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(34,211,238,0.25); border-right: 2px solid rgba(34,211,238,0.25); border-radius: 0 0 2px 0; }
</style>
</head>
<body>
<div class="hero">
  <div class="grid-overlay"></div>
  <div class="blob-tl"></div>
  <div class="blob-br"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Left: Text -->
  <div class="left-panel">
    <div class="post-tag">
      <span class="post-tag-pill">Post 2 of 10</span>
      <span class="post-tag-num">Agentic Development Series</span>
    </div>
    <div class="main-title">How <em>3 AI Agents</em><br>Found a Bug<br>1 Agent Missed</div>
    <div class="subtitle">
      <span>Multi-Agent Consensus</span> for Code Quality —<br>
      when one perspective isn't enough
    </div>
    <div class="author">By <strong>Nick Krzemienski</strong></div>
  </div>

  <!-- Right: Diagram -->
  <div class="right-panel">
    <div class="diagram">

      <!-- SVG connector lines -->
      <svg class="diagram-svg" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
        <!-- Lead → Alpha -->
        <line x1="240" y1="120" x2="110" y2="220" stroke="rgba(99,102,241,0.4)" stroke-width="1.5" stroke-dasharray="6,4"/>
        <!-- Lead → Bravo -->
        <line x1="240" y1="120" x2="370" y2="220" stroke="rgba(99,102,241,0.4)" stroke-width="1.5" stroke-dasharray="6,4"/>
        <!-- Alpha → Gate -->
        <line x1="110" y1="320" x2="220" y2="360" stroke="rgba(34,211,238,0.35)" stroke-width="1.5" stroke-dasharray="6,4"/>
        <!-- Bravo → Gate -->
        <line x1="370" y1="320" x2="260" y2="360" stroke="rgba(167,139,250,0.35)" stroke-width="1.5" stroke-dasharray="6,4"/>
        <!-- Lead → Gate -->
        <line x1="240" y1="120" x2="240" y2="358" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="4,6"/>

        <!-- Consensus arrow -->
        <path d="M 180 348 L 220 360" stroke="#059669" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
        <path d="M 300 348 L 260 360" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 Z" fill="#059669"/>
          </marker>
        </defs>
      </svg>

      <!-- Agent: Lead -->
      <div class="agent-circle agent-lead">
        <div class="agent-label">LEAD</div>
        <div class="agent-sublabel">Coordinator</div>
        <div class="agent-check">&#10003;</div>
      </div>

      <!-- Agent: Alpha -->
      <div class="agent-circle agent-alpha">
        <div class="agent-label">ALPHA</div>
        <div class="agent-sublabel">Reviewer</div>
        <div class="agent-check">&#10003;</div>
      </div>

      <!-- Agent: Bravo -->
      <div class="agent-circle agent-bravo">
        <div class="agent-label">BRAVO</div>
        <div class="agent-sublabel">Reviewer</div>
        <div class="agent-check">&#10003;</div>
      </div>

      <!-- Gate -->
      <div class="gate">
        <div class="gate-label">&#9646; Gate</div>
        <div class="gate-sublabel">Consensus Pass</div>
      </div>

    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
